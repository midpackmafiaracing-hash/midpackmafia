    }
    .page-title span { color: #ff0000; }

    .subscribe-bar {
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      padding: 1.25rem 2.5rem;
    }
    .subscribe-bar-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;

    .subscribe-text {

      text-transform: uppercase;

    .subscribe-btn {

      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: #ff0000;
      color: #fff;
      border: none;
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;

    .subscribe-btn:hover { background: #cc0000; }

    .calendar-wrap {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 2.5rem;

    .month-label {
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .events-list { margin-bottom: 3rem; }

    .event-card {
      display: grid;
      grid-template-columns: 90px 1fr auto;
      align-items: center;
      gap: 1.5rem;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-left: 3px solid #ff0000;
      padding: 1.25rem 1.5rem;
      margin-bottom: 8px;
    }
    .event-card:hover { background: #111; }

    .event-date-block {
      text-align: center;
      background: #000;
      border: 1px solid #222;
      padding: 0.5rem;
    }
    .event-day {
      font-family: 'Saira', sans-serif;
      font-weight: 800;
      font-size: 32px;
      color: #ff0000;
      line-height: 1;
    }
    .event-weekday {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      margin-top: 2px;
    }

    .event-info { flex: 1; }
    .event-name {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #fff;
      margin-bottom: 6px;
    }
    .event-meta {
      font-family: 'Saira', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #555;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .event-meta span { color: #888; margin-right: 16px; }

    .event-badge {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid #ff0000;
      color: #ff0000;
      white-space: nowrap;
    }

    .status-msg {
      text-align: center;
      padding: 4rem 2rem;
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #333;
    }

    footer {
      background: #000;
      border-top: 3px solid #ff0000;
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 4rem;
    }
    .footer-copy {
      font-family: 'Saira', sans-serif;
      font-weight: 400;
      font-size: 13px;
      color: #444;
      letter-spacing: 0.08em;
    }
    .footer-tagline {
      font-family: 'Saira', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ff0000;
    }
  </style>

<body>

<nav>
  <a class="nav-wordmark" href="index.html">MID PACK <span>MAFIA</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>

    <li><a href="series.html">Series</a></li>
    <li><a href="results.html">Results</a></li>
    <li><a href="media.html">Media</a></li>
    <li><a href="calendar.html" class="active">Calendar</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div class="section-label">Schedule</div>
    <h1 class="page-title">Race <span>Calendar</span></h1>
  </div>
</div>

<div class="subscribe-bar">
  <div class="subscribe-bar-inner">
    <div class="subscribe-text">Add MPM events to your personal calendar</div>
    <a class="subscribe-btn" href="https://calendar.google.com/calendar/r?cid=midpackmafiaracing@gmail.com" target="_blank">Subscribe to Calendar</a>
  </div>
</div>

<div class="calendar-wrap">
  <div id="calendar-output" class="status-msg">Loading race schedule...</div>
</div>

<footer>
  <div class="footer-copy">&copy; 2025 Mid Pack Mafia. All rights reserved.</div>
  <div class="footer-tagline">Respect the Process. Fear the Results.</div>
</footer>

<script>
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const CAL_ID = encodeURIComponent('midpackmafiaracing@gmail.com');

  function parseIcal(text) {
    const events = [];
    const unfolded = text.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
    const lines = unfolded.split(/\r?\n/);
    let ev = null;
    for (const line of lines) {
      if (line === 'BEGIN:VEVENT') {
        ev = {};
      } else if (line === 'END:VEVENT') {
        if (ev && ev.summary) events.push(ev);
        ev = null;
      } else if (ev) {
        if (line.startsWith('SUMMARY:')) {
          ev.summary = line.slice(8).replace(/\\,/g, ',').replace(/\\n/g, ' ').trim();
        } else if (line.startsWith('DTSTART;VALUE=DATE:')) {
          const d = line.slice(19).trim();
          ev.start = new Date(d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8)+'T12:00:00');
          ev.allDay = true;
        } else if (line.match(/^DTSTART(;TZID=[^:]+)?:/)) {
          const val = line.split(':').slice(1).join(':').trim();
          if (val.endsWith('Z')) {
            ev.start = new Date(val.slice(0,4)+'-'+val.slice(4,6)+'-'+val.slice(6,8)+'T'+val.slice(9,11)+':'+val.slice(11,13)+':'+val.slice(13,15)+'Z');
          } else if (val.includes('T')) {
            ev.start = new Date(val.slice(0,4)+'-'+val.slice(4,6)+'-'+val.slice(6,8)+'T'+val.slice(9,11)+':'+val.slice(11,13)+':'+val.slice(13,15));
          } else {
            ev.start = new Date(val.slice(0,4)+'-'+val.slice(4,6)+'-'+val.slice(6,8)+'T12:00:00');
            ev.allDay = true;
          }
        } else if (line.startsWith('LOCATION:')) {
          ev.location = line.slice(9).replace(/\\,/g, ',').trim();
        }
      }
    }
    return events;
  }

  function renderEvents(events) {
    const now = new Date();
    const lookahead = new Date(); lookahead.setMonth(lookahead.getMonth() + 9);

    const upcoming = events
      .filter(ev => ev.start >= now && ev.start <= lookahead)
      .sort((a, b) => a.start - b.start);

    if (upcoming.length === 0) {
      return '<div class="status-msg">No upcoming events scheduled. Check back soon.</div>';
    }

    const grouped = {};
    upcoming.forEach(ev => {
      const key = ev.start.getFullYear() + '-' + String(ev.start.getMonth()).padStart(2, '0');
      if (!grouped[key]) grouped[key] = { label: MONTHS[ev.start.getMonth()] + ' ' + ev.start.getFullYear(), events: [] };
      grouped[key].events.push(ev);
    });

    let html = '';
    Object.values(grouped).forEach(group => {
      html += `<div class="month-label">${group.label}</div><div class="events-list">`;
      group.events.forEach(ev => {
        const day = String(ev.start.getDate()).padStart(2, '0');
        const weekday = DAYS[ev.start.getDay()];
        const time = ev.allDay ? 'All Day' : ev.start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        const loc = ev.location ? `<span>${ev.location.split(',')[0]}</span>` : '';
        html += `
          <div class="event-card">
            <div class="event-date-block">
              <div class="event-day">${day}</div>
              <div class="event-weekday">${weekday}</div>
            </div>
            <div class="event-info">
              <div class="event-name">${ev.summary}</div>
              <div class="event-meta"><span>${time}</span>${loc}</div>
            </div>
            <div class="event-badge">Upcoming</div>
          </div>`;
      });
      html += '</div>';
    });
    return html;
  }

  async function tryFetch(url) {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  }

  async function loadCalendar() {
    const output = document.getElementById('calendar-output');
    const icalUrl = `https://calendar.google.com/calendar/ical/${CAL_ID}/public/basic.ics`;
    const proxies = [
      `https://api.allorigins.win/raw?url=${encodeURIComponent(icalUrl)}`,
      `https://corsproxy.io/?${encodeURIComponent(icalUrl)}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(icalUrl)}`
    ];

    for (const proxy of proxies) {
      try {
        const text = await tryFetch(proxy);
        if (text.includes('BEGIN:VCALENDAR')) {
          const events = parseIcal(text);
          output.innerHTML = renderEvents(events);
          return;
        }
      } catch(e) { continue; }
    }

    output.innerHTML = '<div class="status-msg" style="color:#555;">Unable to load calendar. Please <a href="https://calendar.google.com/calendar/r?cid=midpackmafiaracing@gmail.com" target="_blank" style="color:#ff0000; font-weight:700;">view on Google Calendar</a>.</div>';
  }

  loadCalendar();
</script>

</body>
