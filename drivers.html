<!DOCTYPE html>
<html>
<head>
  <title>MPM Drivers</title>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #0d0d0d;
      font-family: 'Saira', sans-serif;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      height: 200px;
      cursor: pointer;
      overflow: hidden;
    }

    .card:hover {
      transform: scale(1.02);
    }

    /* CARD BACKGROUND */
    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* DARK GRADIENT FOR TEXT READABILITY */
    .card::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 65%;
      height: 100%;
      background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
      z-index: 2;
    }

    /* FLAG */
    .flag {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
      z-index: 5;
    }

    /* DRIVER IMAGE */
    .driver-img {
      position: absolute;
      right: 15px;
      bottom: 0;
      height: 85%;
      max-width: 45%;
      object-fit: contain;
      z-index: 3;
    }

    /* TEXT INFO */
    .info {
      position: absolute;
      left: 15px;
      bottom: 65px;
      z-index: 6;
    }

    .number {
      color: #ff0000;
      font-weight: 700;
      font-size: 14px;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
    }

    /* STATS / SIMS */
    .stats {
      position: absolute;
      bottom: 15px;
      left: 15px;
      font-size: 12px;
      opacity: 0.85;
      z-index: 6;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-content {
      background: #111;
      padding: 20px;
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 24px;
    }
  </style>
</head>

<body>

<h1>Mid Pack Mafia Drivers</h1>

<div class="grid"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/1EOr53DgnftbMkTDIZQcmga4u5WkbF7k-W-CGB32_cPo/Sheet1";

async function loadDrivers() {
  const res = await fetch(sheetURL);
  const drivers = await res.json();

  const grid = document.querySelector(".grid");

  drivers.forEach(driver => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="bg" src="images/ui/mpm-card.png">

      <img class="flag"
           src="https://flagcdn.com/w40/${driver.country}.png"
           onerror="this.style.display='none'">

      <img class="driver-img" src="${driver.driver_image}">

      <div class="info">
        <div class="number">#${driver.number}</div>
        <div class="name">${driver.name}</div>
      </div>

      <div class="stats">
        ${driver.sims}
      </div>
    `;

    card.onclick = () => openModal(driver);

    grid.appendChild(card);
  });
}

function openModal(driver) {

  const highlights = (driver.highlights || "").split(";").join("<br>");

  const modal = document.createElement("div");
  modal.className = "modal";

  modal.innerHTML = `
    <div class="modal-content">
      <span class="close" onclick="this.parentElement.parentElement.remove()">&times;</span>

      <img src="${driver.image}" style="width:100%; border-radius:8px; margin-bottom:10px;">

      <h2>#${driver.number} ${driver.name}</h2>

      <p><strong>Time in MPM:</strong> ${driver.time_in_mpm}</p>
      <p><strong>Location:</strong> ${driver.location}</p>
      <p><strong>Age:</strong> ${driver.age}</p>
      <p><strong>Experience:</strong> ${driver.experience}</p>
      <p><strong>Preferred Sims:</strong> ${driver.sims}</p>
      <p><strong>Current Car:</strong> ${driver.car}</p>
      <p><strong>Driving Style:</strong> ${driver.style}</p>

      <p><strong>Highlights:</strong><br>${highlights}</p>
    </div>
  `;

  document.body.appendChild(modal);
}

loadDrivers();
</script>

</body>
</html>
