<!DOCTYPE html>
<html>
<head>
  <title>MPM Drivers</title>
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #0d0d0d;
      font-family: 'Saira', sans-serif;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      height: 180px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .bg {
      width: 100%;
      height: 100%;
    }

    .flag {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 40px;
    }

    .driver-img {
      position: absolute;
      right: 0;
      bottom: 0;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      left: 15px;
      bottom: 50px;
    }

    .number {
      color: #ff0000;
      font-weight: 700;
    }

    .name {
      font-size: 18px;
      font-weight: 700;
    }

    .stats {
      position: absolute;
      bottom: 10px;
      left: 15px;
      display: flex;
      gap: 10px;
      font-size: 12px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 20px;
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 24px;
    }
  </style>
</head>

<body>

<h1>Mid Pack Mafia Drivers</h1>

<div class="grid"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/1EOr53DgnftbMkTDIZQcmga4u5WkbF7k-W-CGB32_cPo/Sheet1";

async function loadDrivers() {
  const res = await fetch(sheetURL);
  const drivers = await res.json();

  const grid = document.querySelector(".grid");

  drivers.forEach(driver => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="bg" src="images/ui/mpm-card.png">

      <img class="flag" src="https://flagcdn.com/w40/${driver.country}.png">

      <img class="driver-img" src="${driver.driver_image}">

      <div class="info">
        <div class="number">#${driver.number}</div>
        <div class="name">${driver.name}</div>
      </div>

      <div class="stats">
        <div>${driver.wins} W</div>
        <div>${driver.best}</div>
        <div>${driver.simgrid} SG</div>
      </div>
    `;

    card.onclick = () => openModal(driver);

    grid.appendChild(card);
  });
}

function openModal(driver) {
  const highlights = driver.highlights.split(";").join("<br>");

  const modal = document.createElement("div");
  modal.className = "modal";

  modal.innerHTML = `
    <div class="modal-content">
      <span class="close" onclick="this.parentElement.parentElement.remove()">&times;</span>

      <img src="${driver.image}" style="width:100%; border-radius:8px;">

      <h2>#${driver.number} ${driver.name}</h2>

      <p><strong>Time in MPM:</strong> ${driver.time_in_mpm}</p>
      <p><strong>Location:</strong> ${driver.location}</p>
      <p><strong>Age:</strong> ${driver.age}</p>
      <p><strong>Experience:</strong> ${driver.experience}</p>
      <p><strong>Preferred Sims:</strong> ${driver.sims}</p>
      <p><strong>Current Car:</strong> ${driver.car}</p>
      <p><strong>Driving Style:</strong> ${driver.style}</p>

      <p><strong>Highlights:</strong><br>${highlights}</p>
    </div>
  `;

  document.body.appendChild(modal);
}

loadDrivers();
</script>

</body>
</html>
